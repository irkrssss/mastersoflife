<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters of Life | Soulful Minimalism</title>
    <meta name="description" content="Премиальные предметы интерьера. Апсайклинг винного стекла и точное столярное мастерство.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Цветовая палитра: Earthy & Atmospheric */
            --color-bg-dark: #151a16; /* Глубокий графит с зеленым подтоном */
            --color-sage: #3e4a3d; /* Приглушенный шалфей */
            --color-sage-light: #5b6e59;
            --color-amber: #d97a46; /* Терракота / Янтарный свет */
            --color-amber-glow: rgba(217, 122, 70, 0.4);
            --color-text: #eae7e0; /* Теплый белый (бумага) */
            --color-text-muted: #9aa099;
            
            /* Шрифты */
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            
            --transition: 0.6s cubic-bezier(0.25, 1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-bg-dark);
            color: var(--color-text);
            font-family: var(--font-sans);
            overflow-x: hidden;
            position: relative;
        }

        /* Текстура: Tactile Grain (цифровой шум) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
        }

        /* Хедер с эффектом матового стекла (Frosted glass) */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(21, 26, 22, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(234, 231, 224, 0.05);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-text);
            text-decoration: none;
        }

        .nav-links a {
            color: var(--color-text);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--color-amber);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
            position: relative;
            /* Легкое янтарное свечение на фоне */
            background: radial-gradient(circle at 50% 40%, rgba(91, 110, 89, 0.2) 0%, transparent 60%);
        }

        /* Ритм слоев (Architectural lines) на фоне Hero */
        .hero::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 40px,
                rgba(255, 255, 255, 0.02) 40px,
                rgba(255, 255, 255, 0.02) 41px
            );
            z-index: -1;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(4rem, 10vw, 9rem);
            font-weight: 400;
            line-height: 0.9;
            margin-bottom: 2rem;
            letter-spacing: -2px;
        }

        .hero h1 span {
            font-style: italic;
            color: var(--color-sage-light);
        }

        .hero p {
            font-size: 1.1rem;
            max-width: 500px;
            color: var(--color-text-muted);
            font-weight: 300;
            line-height: 1.6;
        }

        /* Сетка продуктов (Soft Geometry: Арки) */
        .portfolio {
            padding: 5vh 5% 15vh;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .arch-card {
            position: relative;
            display: block;
            text-decoration: none;
            /* Форма арки (сечение бутылки) */
            border-radius: 200px 200px 10px 10px;
            overflow: hidden;
            aspect-ratio: 3 / 4;
            background: var(--color-sage);
            isolation: isolate;
        }

        .arch-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition), filter var(--transition);
            filter: grayscale(20%) brightness(0.8);
        }

        /* Эффект янтарного света при наведении */
        .arch-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 70%, var(--color-amber-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity var(--transition);
            mix-blend-mode: overlay;
        }

        .card-content {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 3rem 2rem 2rem;
            background: linear-gradient(to top, var(--color-bg-dark) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            transition: all var(--transition);
        }

        .arch-card:hover img {
            transform: scale(1.03);
            filter: grayscale(0%) brightness(1);
        }

        .arch-card:hover::after {
            opacity: 1;
        }

        .arch-card:hover .card-content {
            transform: translateY(0);
            opacity: 1;
        }

        .card-title {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--color-text);
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-amber);
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .portfolio { grid-template-columns: 1fr; gap: 2rem; padding: 5vh 5%; }
            .arch-card { border-radius: 150px 150px 10px 10px; }
            .card-content { transform: translateY(0); opacity: 1; background: linear-gradient(to top, rgba(21, 26, 22, 0.9) 0%, transparent 100%); }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Masters of Life</a>
        <nav class="nav-links">
            <a href="#collection">Коллекция</a>
            <a href="#about">О бренде</a>
            <a href="#franchise">Франшиза</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Warm <span>Minimalism</span></h1>
        <p>Архитектура света. Мы соединяем 84 слоя березового шпона и переработанное стекло, создавая предметы с глубоким культурным кодом.</p>
    </section>

    <section class="portfolio" id="collection">
        
        <a href="#" class="arch-card">
            <img src="photo_2026-03-03 18.05.18.jpeg" alt="Лампа Amber Glow">
            <div class="card-content">
                <h2 class="card-title">Светильники</h2>
                <span class="card-subtitle">Атмосферный свет</span>
            </div>
        </a>

        <a href="#" class="arch-card">
            <img src="вар 3.jpg" alt="Интерьерные тарелки">
            <div class="card-content">
                <h2 class="card-title">Сервировка</h2>
                <span class="card-subtitle">Искусство фьюзинга</span>
            </div>
        </a>

        <a href="#" class="arch-card" style="border-radius: 10px 10px 200px 200px;"> <img src="photo_2026-03-03 18.05.07.jpeg" alt="Производство Masters of Life">
            <div class="card-content" style="bottom: auto; top: 0; background: linear-gradient(to bottom, var(--color-bg-dark) 0%, transparent 100%);">
                <h2 class="card-title">Франшиза</h2>
                <span class="card-subtitle">Технологичное ремесло</span>
            </div>
        </a>

    </section>

</body>
</html>
