<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters of Life | Предметы с характером</title>
    <meta name="description" content="Интерьер, который вызывает эмоции. Дизайнерские светильники и тарелки из переработанных винных бутылок.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Цвет темного бутылочного стекла */
            --bg-color: #0d1a11; 
            /* Светлый текст для контраста */
            --text-color: #eaeaea; 
            /* Тёплое оранжевое/янтарное свечение */
            --accent-glow: #ff9f43; 
            --accent-dim: rgba(255, 159, 67, 0.2);
            
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 1. БЛОК С НАЗВАНИЕМ И ОПИСАНИЕМ */
        .intro-section {
            padding: 10vh 5% 5vh;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .massive-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 12rem); /* Адаптивный огромный текст */
            font-weight: 400;
            line-height: 1;
            margin-bottom: 2rem;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .short-desc {
            font-size: clamp(1rem, 2vw, 1.5rem);
            max-width: 800px;
            font-weight: 300;
            line-height: 1.5;
            color: rgba(234, 234, 234, 0.8);
        }

        /* 2. БЛОК С ВИДЕО */
        .video-wrapper {
            width: 95%;
            margin: 0 auto 5vh auto;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            /* Пропорции 16:9 */
            aspect-ratio: 16 / 9;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Заглушка, если видео не загрузится */
        .video-fallback {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #0d1a11, #1a3322);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: -1;
        }

        /* 3. КЛИКАБЕЛЬНАЯ СЕТКА ПРОДУКТОВ (АНИМАЦИИ/ФОТО) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            padding: 0 2.5% 10vh;
        }

        .product-link {
            display: block;
            text-decoration: none;
            color: inherit;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4 / 5; /* Вертикальный формат карточек */
            background-color: #08120b;
        }

        .product-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition), filter var(--transition);
            filter: brightness(0.8);
        }

        .product-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, var(--accent-dim) 0%, transparent 60%);
            opacity: 0;
            transition: opacity var(--transition);
            display: flex;
            align-items: flex-end;
            padding: 2rem;
        }

        .product-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all var(--transition);
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* Эффекты при наведении */
        .product-link:hover .product-media {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .product-link:hover .product-overlay {
            opacity: 1;
        }

        .product-link:hover .product-title {
            transform: translateY(0);
            opacity: 1;
            color: var(--accent-glow);
        }

        /* Адаптация под телефоны */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .product-link {
                aspect-ratio: 1 / 1; /* На телефоне квадратные */
            }
            .product-overlay {
                opacity: 1; /* На телефоне текст видно сразу */
                background: linear-gradient(to top, rgba(13, 26, 17, 0.9), transparent 50%);
            }
            .product-title {
                transform: translateY(0);
                opacity: 1;
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <section class="intro-section">
        <h1 class="massive-title">Masters<br>of Life</h1>
        <p class="short-desc">Интерьер, который вызывает эмоции. Мы превращаем винные бутылки в предметы искусства: от тёплого света до эстетичной сервировки.</p>
    </section>

    <section class="video-wrapper">
        <video class="main-video" autoplay loop muted playsinline>
            <source src="main-video.mp4" type="video/mp4">
        </video>
        <div class="video-fallback">Здесь будет красивое видео процесса или продукта</div>
    </section>

    <section class="products-grid">
        
        <a href="lamp-amber.html" class="product-link">
            <img src="photo_2026-03-03 18.05.18.jpeg" alt="Лампа Amber" class="product-media">
            <div class="product-overlay">
                <h2 class="product-title">Светильник Amber</h2>
            </div>
        </a>

        <a href="plates.html" class="product-link">
            <img src="вар 3.jpg" alt="Тарелки из бутылок" class="product-media">
            <div class="product-overlay">
                <h2 class="product-title">Набор для сервировки</h2>
            </div>
        </a>

        <a href="lamp-accent.html" class="product-link">
            <img src="photo_2026-03-03 18.05.12.jpeg" alt="Лампа Accent" class="product-media">
            <div class="product-overlay">
                <h2 class="product-title">Лампа Accent</h2>
            </div>
        </a>

        <a href="franchise.html" class="product-link">
            <img src="photo_2026-03-03 18.05.07.jpeg" alt="Франшиза производства" class="product-media" style="filter: grayscale(50%) brightness(0.6);">
            <div class="product-overlay">
                <h2 class="product-title">Открыть производство</h2>
            </div>
        </a>

    </section>

</body>
</html>
